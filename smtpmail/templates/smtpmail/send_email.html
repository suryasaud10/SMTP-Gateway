<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Gateway | Send Message</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for beautiful alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .email-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #ffffff;
            margin-top: 50px;
        }
        .card-header {
            background: #6f42c1;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .form-control:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 0 0.25rem rgba(111, 66, 193, 0.25);
        }
        .btn-send {
            background: #6f42c1;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-send:hover {
            background: #59359a;
            transform: translateY(-2px);
        }
        .smtp-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .loader {
            display: none;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card email-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="fas fa-paper-plane me-2"></i> New Email</h4>
                    <span class="smtp-badge">
                        <i class="fas fa-server me-1"></i> {{ config.smtp_host }}
                    </span>
                </div>
                <div class="card-body p-4">
                    
                    <form id="emailForm" method="POST">
                        {% csrf_token %}
                        
                        <!-- Recipient -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Recipient Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" name="recipient" class="form-control" placeholder="example@domain.com" required>
                            </div>
                        </div>

                        <!-- Subject -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Subject</label>
                            <input type="text" name="subject" class="form-control" placeholder="Enter email subject" required>
                        </div>

                        <!-- Message -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Message Body</label>
                            <textarea name="message" class="form-control" rows="6" placeholder="Write your message here..." required></textarea>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" id="submitBtn" class="btn btn-primary btn-send w-100 text-white">
                            <span class="spinner-border spinner-border-sm loader" id="btnLoader" role="status"></span>
                            <span id="btnText">Send Email</span>
                        </button>
                    </form>

                </div>
                <div class="card-footer bg-light text-center py-3">
                    <small class="text-muted">Connected as: <strong>{{ config.username }}</strong></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const emailForm = document.getElementById('emailForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnLoader = document.getElementById('btnLoader');
    const btnText = document.getElementById('btnText');

    emailForm.addEventListener('submit', function(e) {
        // Show loading state
        submitBtn.disabled = true;
        btnLoader.style.display = 'inline-block';
        btnText.innerText = 'Queuing Task...';

        // If you want to use the standard Django redirect, 
        // don't use e.preventDefault(). The page will reload
        // and Django's messages.success will show the result.
        
        // If you prefer a popup without page reload, use AJAX/Fetch here.
    });

    // Auto-show Django messages using SweetAlert2
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: 'success',
                title: 'Sent!',
                text: "{{ message }}",
                confirmButtonColor: '#6f42c1'
            });
        {% endfor %}
    {% endif %}
</script>

</body>
</html>
